name: AI Code Review (Gemini 3.1)

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review, labeled]

jobs:
  review:
    if: >-
      github.event.sender.type != 'Bot' &&
      github.event.pull_request.draft == false &&
      (
        github.event.pull_request.additions > 150 ||
        contains(github.event.pull_request.labels.*.name, 'ai-review')
      )

    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.VERTEX_SERVICE_ACCOUNT_JSON }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Run PR Agent
        uses: the-pr-agent/pr-agent@main
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          VERTEXAI_PROJECT: ${{ secrets.VERTEX_PROJECT_ID }}
          VERTEXAI_LOCATION: global
          config.model: gemini-3.1-pro-preview
          config.custom_model_max_tokens: "1048576"
          config.verbosity_level: "2"
          config.output_relevant_configurations: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "false"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened","reopened","synchronize","ready_for_review","labeled"]'
          pr_code_suggestions.commitable_code_suggestions: "true"
          pr_code_suggestions.focus_only_on_problems: "true"